name: Trufflehog Secrets Scan
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/v3.95.5/scripts/install.sh | sh -s -- -b /usr/local/bin v3.95.5
      - run: trufflehog github --repo=https://github.com/${{ github.repository }} --only-verified --no-update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
