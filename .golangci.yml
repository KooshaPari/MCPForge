version: "2"
linters:
  enable:
    - dogsled
    - exhaustive
    - gocritic
    - gosec
    - misspell
    - noctx
    - nolintlint
  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - io.ReadAll
    staticcheck:
      checks:
        - all
        - -SA1012
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/KooshaPari
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
